font_family      JetBrainsMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

remember_window_size   no
initial_window_width   640
initial_window_height  480
background_opacity  1.0
# background  #212121

# Emoji support (color emoji for ranges not covered by Nerd Font)
symbol_map U+1F600-U+1F64F,U+1F300-U+1F5FF,U+1F680-U+1F6FF,U+1F1E0-U+1F1FF,U+1F900-U+1F9FF,U+1FA00-U+1FA6F,U+1FA70-U+1FAFF Noto Color Emoji

# Miscellaneous Technical symbols (e.g. ⎿ ⏵ used by Claude Code)
# Avoid overriding Nerd Font glyphs at U+23CE and U+23FB-U+23FE
symbol_map U+2300-U+23CD Noto Sans Symbols
symbol_map U+23CF-U+23FA Noto Sans Symbols2


# BEGIN_KITTY_THEME
# Sundried
include current-theme.conf
# END_KITTY_THEME